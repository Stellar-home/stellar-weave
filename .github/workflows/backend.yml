name: Backend

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

env:
  CARGO_TERM_COLOR: always
  # Persist cargo registry and build cache between runs
  CARGO_HOME: ${{ github.workspace }}/.cargo

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: backend-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: backend-${{ runner.os }}-

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: backend-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: backend-${{ runner.os }}-

      - name: cargo test
        run: cargo test --all-features

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: backend-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: backend-${{ runner.os }}-

      - name: cargo build --release
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/target/release/backend
          retention-days: 7

  # ── Deploy (only on pushes to main) ────────────────────────────────────────
